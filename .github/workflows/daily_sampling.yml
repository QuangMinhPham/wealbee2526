name: Wealbee Daily Sampling

on:
  schedule:
    - cron: '0 0 * * *'   # 0:00 UTC = 7:00 AM Vietnam (UTC+7)
  workflow_dispatch:

jobs:
  daily-sampling:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: toolcrawldata/requirements.txt

      - name: Install dependencies
        run: pip install -r toolcrawldata/requirements.txt

      - name: Run daily sampling
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd toolcrawldata
          python daily_sampling.py
