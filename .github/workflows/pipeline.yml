name: Wealbee Daily Pipeline

on:
  schedule:
    - cron: '0 0 * * *'   # 0:00 UTC = 7:00 AM Vietnam (UTC+7)
  workflow_dispatch:        # Cho phép chạy thủ công trên GitHub UI

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: toolcrawldata/requirements.txt

      - name: Install dependencies
        run: pip install -r toolcrawldata/requirements.txt

      - name: Run pipeline
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OPENAI_API_KEY:       ${{ secrets.OPENAI_API_KEY }}
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM:           ${{ secrets.EMAIL_FROM }}
        run: |
          cd toolcrawldata
          python pipeline_runner.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_number }}
          path: toolcrawldata/logs/
          retention-days: 7
